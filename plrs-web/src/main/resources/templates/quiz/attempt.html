<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <p class="mb-3">
        <a th:href="@{/catalog/{id}(id=${quiz.contentId()})}" class="link-secondary">
            &larr; Back to content
        </a>
    </p>

    <h1 class="h3 mb-1" th:text="${quiz.title()}">Quiz</h1>
    <p class="text-muted mb-4">
        <span th:text="${quiz.itemCount()}">0</span> question(s)
    </p>

    <form th:action="@{/quiz/{id}/attempt(id=${quiz.contentId()})}" method="post"
          th:object="${form}">
        <input type="hidden" th:if="${_csrf != null}"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <div class="card mb-3" th:each="item : ${items}">
            <div class="card-body">
                <h5 class="card-title">
                    <span th:text="${item.itemOrder()}">1</span>.
                    <span th:text="${item.stem()}">Stem</span>
                </h5>
                <div class="form-check"
                     th:each="opt : ${item.options()}"
                     th:with="inputId=${'q' + item.itemOrder() + 'o' + opt.optionOrder()}">
                    <input class="form-check-input" type="radio"
                           th:name="|answers[${item.itemOrder()}]|"
                           th:id="${inputId}"
                           th:value="${opt.optionOrder()}"/>
                    <label class="form-check-label" th:for="${inputId}"
                           th:text="${opt.text()}">option</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Submit Quiz</button>
    </form>
</div>
</body>
</html>
