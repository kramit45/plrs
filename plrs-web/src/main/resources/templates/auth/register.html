<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="h3 card-title mb-3">Register</h1>

                    <div th:if="${flashSuccess}"
                         class="alert alert-success" role="alert"
                         th:text="${flashSuccess}">Registered.</div>

                    <form th:action="@{/register}" th:object="${form}" method="post" novalidate>
                        <input type="hidden"
                               th:name="${_csrf != null ? _csrf.parameterName : '_csrf_placeholder'}"
                               th:value="${_csrf != null ? _csrf.token : ''}"/>

                        <div th:if="${#fields.hasGlobalErrors()}"
                             class="alert alert-danger" role="alert">
                            <ul class="mb-0">
                                <li th:each="err : ${#fields.globalErrors()}"
                                    th:text="${err}">global error</li>
                            </ul>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                   autocomplete="email"/>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}">email error</div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                   autocomplete="new-password"/>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}">password error</div>
                        </div>

                        <button type="submit" class="btn btn-primary">Register</button>
                    </form>

                    <p class="mt-3 mb-0">
                        Already have an account?
                        <a th:href="@{/login}">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
