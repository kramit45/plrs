<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <h1 class="h3 mb-4">Catalogue</h1>

    <form th:action="@{/catalog}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" name="q" class="form-control"
                   placeholder="Search content..."
                   th:value="${q}" id="search-q"/>
            <button class="btn btn-primary" type="submit">Search</button>
        </div>
    </form>

    <div th:if="${q != null and !#strings.isEmpty(#strings.trim(q))}">
        <div th:if="${page.totalElements > 0}">
            <p class="text-muted small">
                <span th:text="${page.totalElements}">0</span> result(s)
                for &quot;<span th:text="${q}">q</span>&quot;.
            </p>
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Difficulty</th>
                    <th>Est. Minutes</th>
                    <th>Tags</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td>
                        <a th:href="@{/catalog/{id}(id=${item.contentId})}"
                           th:text="${item.title}">title</a>
                    </td>
                    <td th:text="${item.ctype}">VIDEO</td>
                    <td th:text="${item.difficulty}">BEGINNER</td>
                    <td th:text="${item.estMinutes}">10</td>
                    <td>
                        <span class="badge bg-secondary me-1"
                              th:each="tag : ${item.tags}"
                              th:text="${tag}">tag</span>
                    </td>
                </tr>
                </tbody>
            </table>

            <nav aria-label="Catalogue pagination" th:if="${page.totalPages > 1}">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${pageNumber == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/catalog(q=${q},pageSize=${pageSize},pageNumber=${pageNumber - 1})}">
                            Previous
                        </a>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link">
                            Page <span th:text="${page.pageNumber + 1}">1</span>
                            of <span th:text="${page.totalPages}">1</span>
                        </span>
                    </li>
                    <li class="page-item"
                        th:classappend="${pageNumber + 1 >= page.totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/catalog(q=${q},pageSize=${pageSize},pageNumber=${pageNumber + 1})}">
                            Next
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <div th:unless="${page.totalElements > 0}" class="alert alert-light border" role="status">
            No results for &quot;<span th:text="${q}">q</span>&quot;. Try a different keyword.
        </div>
    </div>

    <div th:if="${q == null or #strings.isEmpty(#strings.trim(q))}">
        <h2 class="h5 mt-4">Browse by topic</h2>
        <div th:if="${rootTopics.isEmpty()}" class="alert alert-light border">
            No topics yet.
        </div>
        <ul class="list-group" th:unless="${rootTopics.isEmpty()}">
            <li class="list-group-item" th:each="topic : ${rootTopics}">
                <strong th:text="${topic.name()}">Topic</strong>
                <span class="text-muted small ms-2"
                      th:if="${topic.description().isPresent()}"
                      th:text="${topic.description().get()}">description</span>
            </li>
        </ul>
    </div>
</div>
</body>
</html>
