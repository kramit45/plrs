<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <div sec:authorize="!isAuthenticated()">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h1 class="h3 card-title">Welcome to PLRS</h1>
                        <p class="card-text">
                            Personalized Learning Recommendation System.
                            Sign in or create an account to get started.
                        </p>
                        <p class="mb-0">
                            <a th:href="@{/login}" class="btn btn-primary">Log in</a>
                            <a th:href="@{/register}" class="btn btn-outline-primary">Register</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div sec:authorize="isAuthenticated()">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h1 class="h3 card-title">
                            Signed in as <span th:text="${principal}">user</span>
                        </h1>
                        <p class="card-text mb-1">
                            Roles:
                            <span th:each="auth, iter : ${authorities}">
                                <span class="badge bg-secondary" th:text="${auth}">ROLE_STUDENT</span><span th:if="${!iter.last}">&nbsp;</span>
                            </span>
                        </p>
                        <form th:action="@{/logout}" method="post" class="mt-3">
                            <button type="submit" class="btn btn-danger">Log out</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
