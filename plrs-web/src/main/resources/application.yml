spring:
  application:
    name: plrs
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/plrs}
    username: ${DB_USER:plrs}
    password: ${DB_PASS:plrs}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: plrs_ops
  flyway:
    enabled: true
    default-schema: plrs_ops
    schemas: plrs_ops,plrs_dw
    locations: classpath:db/migration
    baseline-on-migrate: false
  # Redis is wired in step 14; exclude its auto-config until then so Boot
  # can start against a bare PostgreSQL.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
