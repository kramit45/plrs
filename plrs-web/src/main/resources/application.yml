spring:
  application:
    name: plrs
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/plrs}
    username: ${DB_USER:plrs}
    password: ${DB_PASS:plrs}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: plrs_ops
  # Flyway and Redis are wired in steps 13–14; exclude their auto-configs
  # until then so Boot can start against a bare PostgreSQL.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
