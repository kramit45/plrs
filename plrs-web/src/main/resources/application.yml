spring:
  application:
    name: plrs
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/plrs}
    username: ${DB_USER:plrs}
    password: ${DB_PASS:plrs}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: plrs_ops
  flyway:
    enabled: true
    default-schema: plrs_ops
    schemas: plrs_ops,plrs_dw
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

plrs:
  jwt:
    access-token-ttl: 2h
    refresh-token-ttl: 30d
    issuer: plrs
    audience: plrs-web
    generate-if-missing: ${PLRS_JWT_GENERATE_IF_MISSING:true}
    private-key-pem: ${PLRS_JWT_PRIVATE_KEY_PEM:}
    public-key-pem: ${PLRS_JWT_PUBLIC_KEY_PEM:}
  cors:
    allowed-origins: http://localhost:8080
  outbox:
    drain:
      enabled: true
      fixed-delay-ms: 5000
      initial-delay-ms: 5000
      batch-size: 25
  ml:
    base-url: ${PLRS_ML_URL:http://localhost:8000}
    hmac-secret: ${PLRS_ML_HMAC_SECRET:dev-secret}
    timeout-seconds: 2
