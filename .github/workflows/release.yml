name: release

# Build the submission zip on demand. Triggered manually via the
# Actions UI (workflow_dispatch) or automatically when a v* tag is
# pushed. The zip is uploaded as a GitHub release artefact so the
# evaluator can download it directly from the release page.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
  push:
    tags:
      - 'v1.*.*'
      - 'v2.*.*'

jobs:
  build-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: pip install "poetry>=1.8"

      - name: Install Python deps
        run: |
          (cd plrs-ml && poetry install --no-interaction)
          (cd plrs-etl-worker && poetry install --no-interaction)

      - name: Build submission zip
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: bash scripts/build_submission.sh

      - name: Upload submission as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: plrs-submission
          path: submission/plrs-submission-*.zip
          if-no-files-found: error

      - name: Attach to GitHub release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: submission/plrs-submission-*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
