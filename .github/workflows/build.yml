name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: plrs_test
          POSTGRES_USER: plrs
          POSTGRES_PASSWORD: plrs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plrs -d plrs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/plrs_test
      DB_USER: plrs
      DB_PASS: plrs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      - name: Upload JaCoCo reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/**'
          if-no-files-found: ignore

  newman-e2e:
    name: newman e2e
    needs: build-and-test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: plrs
          POSTGRES_USER: plrs
          POSTGRES_PASSWORD: plrs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plrs -d plrs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/plrs
      DB_USER: plrs
      DB_PASS: plrs
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      PLRS_JWT_GENERATE_IF_MISSING: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman

      - name: Package application (skip tests — covered by build-and-test)
        run: mvn -B -ntp -pl plrs-web -am package -DskipTests

      - name: Start application
        run: |
          java -jar plrs-web/target/plrs.jar > app.log 2>&1 &
          echo "APP_PID=$!" >> $GITHUB_ENV

      - name: Wait for /health
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8080/health > /dev/null; then
              echo "App is up."
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy in time." >&2
          tail -n 200 app.log || true
          exit 1

      - name: Run Newman Iter 1 collection
        run: |
          newman run test/newman/plrs-iter1.postman_collection.json \
            -e test/newman/plrs-iter1.postman_environment.json

      - name: Load Iter 2 seed
        run: |
          PGPASSWORD=plrs psql -h localhost -U plrs -d plrs \
            -f test/newman/seed.sql

      - name: Run Newman Iter 2 collection
        run: |
          newman run test/newman/plrs-iter2.postman_collection.json \
            -e test/newman/plrs-iter2.postman_environment.json

      - name: Upload application log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log
          if-no-files-found: ignore

      - name: Stop application
        if: always()
        run: |
          if [ -n "${APP_PID:-}" ]; then
            kill "$APP_PID" || true
          fi
