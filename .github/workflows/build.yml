name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build and test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: plrs_test
          POSTGRES_USER: plrs
          POSTGRES_PASSWORD: plrs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plrs -d plrs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/plrs_test
      DB_USER: plrs
      DB_PASS: plrs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      - name: Upload JaCoCo reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/**'
          if-no-files-found: ignore
